<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c5cff"/>
    </marker>
    <marker id="arrow-start" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#7c5cff"/>
    </marker>
    <style>
      .title { font-size: 17px; font-weight: 700; fill: #1b1730; }
      .sub   { font-size: 12.5px; fill: #6b6580; }
      .edge  { font-size: 12.5px; font-weight: 600; fill: #4b4566; }
      .note  { font-size: 11px; fill: #8a84a0; }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="759" height="299" rx="14" fill="#faf9ff" stroke="#e7e3f5"/>
  <text x="380" y="38" text-anchor="middle" font-size="14" font-weight="700" fill="#7c5cff" letter-spacing="0.5">PHONE KEYBOARD — ARCHITECTURE</text>

  <!-- Phone -->
  <rect x="30" y="90" width="200" height="120" rx="14" fill="#ffffff" stroke="#d9d3f0" stroke-width="1.5"/>
  <text x="130" y="138" text-anchor="middle" class="title">Phone</text>
  <text x="130" y="162" text-anchor="middle" class="sub">web app</text>
  <text x="130" y="181" text-anchor="middle" class="sub">types text</text>

  <!-- Relay server -->
  <rect x="280" y="90" width="200" height="120" rx="14" fill="#ffffff" stroke="#7c5cff" stroke-width="2"/>
  <text x="380" y="138" text-anchor="middle" class="title">Local relay server</text>
  <text x="380" y="162" text-anchor="middle" class="sub">runs on the laptop</text>
  <text x="380" y="181" text-anchor="middle" class="sub">WebSocket hub</text>

  <!-- Extension -->
  <rect x="530" y="90" width="200" height="120" rx="14" fill="#ffffff" stroke="#d9d3f0" stroke-width="1.5"/>
  <text x="630" y="138" text-anchor="middle" class="title">Chrome extension</text>
  <text x="630" y="162" text-anchor="middle" class="sub">bubble + input sync</text>
  <text x="630" y="181" text-anchor="middle" class="sub">on the laptop</text>

  <!-- Edge: phone <-> relay -->
  <line x1="234" y1="150" x2="276" y2="150" stroke="#7c5cff" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>
  <text x="255" y="72" text-anchor="middle" class="edge">WebSocket</text>
  <text x="255" y="240" text-anchor="middle" class="note">over LAN · token required</text>

  <!-- Edge: relay <-> extension -->
  <line x1="484" y1="150" x2="526" y2="150" stroke="#7c5cff" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow-start)"/>
  <text x="505" y="72" text-anchor="middle" class="edge">WebSocket</text>
  <text x="505" y="240" text-anchor="middle" class="note">localhost · no token</text>

  <text x="380" y="282" text-anchor="middle" class="note">No cloud component — all traffic stays on your local network</text>
</svg>
